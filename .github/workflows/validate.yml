name: validate

# Enforces the reconciliation guarantee: every example instance in examples/
# must validate against the canonical JSON Schema for its object_type, and
# every schema must itself be a valid JSON Schema.

on:
  # Runs on every pull request (not path-filtered) so the check always reports a
  # status and can be a required, non-bypassable branch-protection gate. The full
  # validation covers the whole repo and completes in well under a minute, so the
  # cost on docs-only PRs is negligible.
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install jsonschema
      - name: Validate schemas and examples
        run: python scripts/validate.py
